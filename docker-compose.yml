services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 700m
    mem_reservation: 400m
    cpus: "0.70"
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build: .
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MINI_APP_URL: ${MINI_APP_URL:?MINI_APP_URL is required}
      BROADCAST_RATE_PER_SECOND: ${BROADCAST_RATE_PER_SECOND:?BROADCAST_RATE_PER_SECOND is required}
      MINI_APP_INIT_DATA_MAX_AGE_SECONDS: ${MINI_APP_INIT_DATA_MAX_AGE_SECONDS:-86400}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:?ADMIN_TELEGRAM_IDS is required}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: ["sh", "-c", "alembic upgrade head && python -m topsbottg"]
    mem_limit: 650m
    mem_reservation: 350m
    cpus: "0.90"
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html/miniapp:ro
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.20"
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    profiles: ["certbot"]
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt

  adminer:
    image: adminer:4
    profiles: ["adminer"]
    restart: "no"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    mem_limit: 128m
    mem_reservation: 64m
    cpus: "0.20"
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  certbot_www:
  certbot_etc:
